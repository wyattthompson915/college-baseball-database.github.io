<!DOCTYPE html>
<html>

<head>
    <title>
        Team Stats
    </title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <h1>Team Stats</h1>
    <div class="tabs">
        <button id="battingBtn">Batting</button>
        <button id="pitchingBtn">Pitching</button>
        <button id="fieldingBtn">Fielding</button>
    </div>
    <br>

    <input
        type="text"
        id="searchBox"
        placeholder="Search for a team..."
    >
    <div class="table-container">
        <table id="battingTable"></table>
    </div>

</body>

</html>
